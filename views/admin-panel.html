<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yönetici Paneli | Recep Taş Hair Design</title>
    <link rel="icon" type="image/png" href="icon.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #141817; 
            --primary-color: #3d6e5b; /* Gözü yormayan soft yeşil */
            --accent-color: #d4af37;  /* Gold detaylar */
            --text-color: #e0e6e4;    /* Yumuşak beyaz/krem yazı rengi */
            --card-bg: #1e2422;       /* Giriş paneli ve tablo kutusu arka planı */
            --input-bg: #252d2a;      /* Girdi alanlarının içi */
            --input-border: #333e3a;  /* Çerçeve rengi */
            --danger-color: #e74c3c;
            --danger-hover: #c0392b;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); padding: 20px; min-height: 100vh; }
        
        /* GİRİŞ EKRANI SÜSLEMELERİ */
        .login-container { 
            display: none; 
            max-width: 400px; 
            margin: 100px auto; 
            background: var(--card-bg); 
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.4); 
            text-align: center; 
            border: 1px solid var(--input-border);
        }
        .login-container h2 { margin-bottom: 20px; color: var(--text-color); font-weight: 700; }
        .form-group { margin-bottom: 15px; text-align: left; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.9rem; color: #abc0b6; }
        .form-group input { width: 100%; padding: 12px 16px; background: var(--input-bg); border: 1px solid var(--input-border); color: var(--text-color); border-radius: 12px; outline: none; transition: border-color 0.2s; }
        .form-group input:focus { border-color: var(--primary-color); }
        .form-group input::placeholder { color: #61756c; }
        
        .btn { width: 100%; padding: 12px; background: var(--primary-color); color: white; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 12px rgba(61, 110, 91, 0.2); }
        .btn:hover { background: #2d5244; transform: translateY(-1px); }
        .error-msg { color: var(--danger-color); font-size: 0.85rem; margin-top: 10px; display: none; font-weight: 600; }

        /* PANEL EKRANI */
        .panel-container { max-width: 1200px; margin: 20px auto; display: none; }
        .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px solid var(--input-border); }
        .panel-header h1 { color: var(--text-color); font-weight: 700; font-size: 1.8rem; }
        
        /* ÜST BUTON GRUBU */
        .header-buttons { display: flex; gap: 10px; align-items: center; }

        .btn-logout { width: auto; padding: 10px 20px; background: var(--danger-color); color: white; border: none; border-radius: 50px; font-weight: 600; cursor: pointer; box-shadow: 0 4px 12px rgba(231, 76, 60, 0.2); transition: all 0.2s; }
        .btn-logout:hover { background: var(--danger-hover); transform: translateY(-1px); }

        .btn-refresh { width: auto; padding: 10px 20px; background: #2d3834 !important; color: #abc0b6; border: 1px solid var(--input-border); border-radius: 50px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .btn-refresh:hover { background: #333e3a !important; color: white; }

        .table-responsive { background: var(--card-bg); border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.3); overflow-x: auto; padding: 15px; border: 1px solid var(--input-border); }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th, td { padding: 16px; border-bottom: 1px solid var(--input-border); font-size: 0.95rem; }
        th { background-color: var(--input-bg); color: #abc0b6; font-weight: 600; text-transform: uppercase; font-size: 0.85rem; letter-spacing: 0.5px; }
        tr:last-child td { border-bottom: none; }
        tr:hover { background-color: rgba(255, 255, 255, 0.02); }
        
        /* RADİKAL DURUM BADGELERİ (DARK MOD UYUMLU) */
        .badge { padding: 6px 12px; border-radius: 8px; font-size: 0.8rem; font-weight: 600; display: inline-block; }
        .badge-aktif { background: rgba(46, 204, 113, 0.15); color: #2ecc71; border: 1px solid rgba(46, 204, 113, 0.3); }
        .badge-iptal { background: rgba(231, 76, 60, 0.15); color: #e74c3c; border: 1px solid rgba(231, 76, 60, 0.3); }
        .badge-geldi { background: rgba(52, 152, 219, 0.15); color: #3498db; border: 1px solid rgba(52, 152, 219, 0.3); }
        .badge-gelmedi { background: rgba(230, 126, 34, 0.15); color: #e67e22; border: 1px solid rgba(230, 126, 34, 0.3); }
        
        .btn-back-home { display: block; margin-top: 20px; color: #8fa39b; font-size: 0.9rem; font-weight: 600; text-decoration: none; transition: all 0.2s ease; }
        .btn-back-home:hover { color: var(--accent-color); text-decoration: underline; }

        /* AKSİYON BUTONLARI */
        .admin-actions { display: flex; gap: 8px; justify-content: center; align-items: center; }
        .btn-action { border: none; width: 34px; height: 34px; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; font-size: 1.1rem; display: flex; align-items: center; justify-content: center; transition: all 0.2s ease; }
        .btn-status-success { background-color: #2ecc71; box-shadow: 0 4px 10px rgba(46, 204, 113, 0.3); }
        .btn-status-success:hover { background-color: #27ae60; transform: scale(1.08); }
        .btn-status-danger { background-color: #e74c3c; box-shadow: 0 4px 10px rgba(231, 76, 60, 0.3); }
        .btn-status-danger:hover { background-color: #c0392b; transform: scale(1.08); }
        th.text-center, td.text-center { text-align: center; }

        /* TELEFON GÖRÜNÜMÜ MOBİL DÜZENLEMELERİ */
        @media (max-width: 768px) {
            .panel-header { flex-direction: column; gap: 15px; text-align: center; align-items: center; }
            .header-buttons { width: 100%; justify-content: center; gap: 12px; }
            .btn-refresh, .btn-logout { flex: 1; max-width: 150px; text-align: center; }
        }
    </style>
</head>
<body>

<div id="loginSection" class="login-container">
    <h2>Yönetici Girişi</h2>
    <div class="form-group">
        <label>Kullanıcı Adı</label>
        <input type="text" id="username" placeholder="Kullanıcı adınız">
    </div>
    <div class="form-group">
        <label>Şifre</label>
        <input type="password" id="password" placeholder="••••••••">
    </div>
    <button class="btn" onclick="login()">Giriş Yap</button>
    <a href="/" class="btn-back-home">Ana Sayfaya Dön</a>
    <div id="loginError" class="error-msg"></div>
</div>

<div id="panelSection" class="panel-container" style="display: none;">
    <div class="panel-header">
        <h1>Randevu Yönetim Paneli</h1>
        <div class="header-buttons">
            <button class="btn-refresh" onclick="verileriCek()">Yenile</button>
            <button class="btn btn-logout" onclick="logout()">Çıkış Yap</button>
        </div>
    </div>
    
    <div class="table-responsive">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Müşteri Adı</th>
                    <th>Telefon</th>
                    <th>Tarih / Saat</th>
                    <th>Hizmetler</th>
                    <th>Fiyat</th>
                    <th>Durum</th>
                    <th>Not / İptal Nedeni</th>
                    <th class="text-center">İşlemler</th>
                </tr>
            </thead>
            <tbody id="randevuTableBody"></tbody>
        </table>
    </div>
</div>

<script>
    window.onload = function() {
        fetch('/api/admin-check')
            .then(res => res.json())
            .then(data => {
                if (data.loggedIn) {
                    showPanel();
                } else {
                    document.getElementById('loginSection').style.display = 'block';
                }
            });
    };

    function login() {
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;
        const errorDiv = document.getElementById('loginError');

        fetch('/api/admin-login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: user, password: pass })
        })
        .then(res => res.json())
        .then(data => {
            if (data.success) {
                showPanel();
            } else {
                errorDiv.innerText = data.message;
                errorDiv.style.display = 'block';
            }
        });
    }

    function showPanel() {
        document.getElementById('loginSection').style.display = 'none';
        document.getElementById('panelSection').style.display = 'block';
        verileriCek();
    }

    function verileriCek() {
        fetch('/admin/veritabani-gor')
            .then(res => {
                if(res.status === 401) { logout(); throw new Error("Yetkisiz"); }
                return res.json();
            })
            .then(data => {
                const tbody = document.getElementById('randevuTableBody');
                tbody.innerHTML = "";

                if (data.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="9" style="text-align:center; color:#61756c;">Henüz kayıtlı randevu yok.</td></tr>`;
                    return;
                }

                data.forEach(row => {
                    let durumBadge = '';
                    if (row.durum === 'aktif') {
                        durumBadge = `<span class="badge badge-aktif">Aktif</span>`;
                    } else if (row.durum === 'iptal') {
                        durumBadge = `<span class="badge badge-iptal">İptal Edildi</span>`;
                    } else if (row.durum === 'geldi') {
                        durumBadge = `<span class="badge badge-geldi">Geldi</span>`;
                    } else if (row.durum === 'gelmedi') {
                        durumBadge = `<span class="badge badge-gelmedi">Gelmedi</span>`;
                    }

                    const ekstraNot = row.durum === 'iptal' 
                        ? (row.not_metni || 'Neden belirtilmedi')
                        : (row.not_metni || '-');

                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${row.id}</td>
                        <td><b style="color: var(--text-color);">${row.ad_soyad}</b></td>
                        <td>${row.telefon}</td>
                        <td>${row.randevu_tarihi}</td>
                        <td>${row.tras_turu}</td>
                        <td style="color: var(--accent-color); font-weight:600;">${row.fiyat} TL</td>
                        <td>${durumBadge}</td>
                        <td style="color: #abc0b6; font-size:0.9rem;">${ekstraNot}</td>
                        <td class="text-center">
                            <div class="admin-actions">
                                <button class="btn-action btn-status-success" onclick="durumGuncelle(${row.id}, 'geldi')" title="Geldi Olarak İşaretle">&#10003;</button>
                                <button class="btn-action btn-status-danger" onclick="yasaklaVeGuncelle(${row.id})" title="Gelmedi ve IP'yi Yasakla">&#10005;</button>
                            </div>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            }).catch(err => console.log(err));
    }

    async function durumGuncelle(id, yeniDurum) {
        try {
            const response = await fetch('/admin/randevu-durum-guncelle', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id, yeniDurum })
            });
            const result = await response.json();
            if (result.success) {
                verileriCek(); 
            } else {
                alert("Hata oluştu: " + result.message);
            }
        } catch (err) {
            console.error("İstek hatası:", err);
            alert("Sunucuya bağlanılamadı!");
        }
    }
async function yasaklaVeGuncelle(id) {
    // Confirm satırını sildik, butona basıldığı an işlem başlayacak
    try {
        const response = await fetch('/admin/yasakla', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id })
        });
        const result = await response.json();
        
        if (result.success) {
            // İstersen burada alert'i de kaldırabilirsin, 
            // işlem sessizce gerçekleşir ve tablo yenilenir
            verileriCek(); 
        } else {
            alert("Hata: " + result.message);
        }
    } catch (err) {
        alert("Sunucuya bağlanılamadı!");
    }
}
    function logout() {
        fetch('/api/admin-logout', { method: 'POST' })
            .then(() => {
                window.location.href = "/";
            });
    }
</script>
</body>
</html>
